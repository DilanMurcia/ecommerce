spring.application.name=api

# --- Database (Neon PostgreSQL) ---
# Values loaded from .env file via spring-dotenv.
# Real credentials are in .env (gitignored). Copy .env.example to .env and fill in.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# 'update' = create tables if missing, update schema on changes (dev-friendly)
# Use 'validate' or 'none' in production to avoid accidental schema changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
